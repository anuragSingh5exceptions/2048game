      # build signed release apk
      - name: Build signed APK
        env:

          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}

        run: |

          ./gradlew clean assembleRelease \
          -PVERSION_NAME=$NEW_VERSION_NAME \
          -PVERSION_CODE=$NEW_VERSION_CODE


      # verify apk exists
      - name: Verify APK
        run: |

          echo "APK files:"
          find app/build -name "*.apk"


      # upload to firebase
      - name: Upload to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:

          appId: ${{ secrets.FIREBASE_APP_ID }}

          token: ${{ secrets.FIREBASE_TOKEN }}

          groups: testers

          file: app/build/outputs/apk/release/app-release.apk

          releaseNotesFile: app/build/release-notes.txt


      - name: Slack Notification

        if: always()

        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENVIRONMENT: ${{ github.event.inputs.ENV }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_ID: ${{ github.sha }}
          ACTOR: ${{ github.actor }}

        run: |

          if [ "${{ job.status }}" = "success" ]; then
            MESSAGE="✅ Build Successful"
          else
            MESSAGE="❌ Build Failed"
          fi

          curl -X POST "$SLACK_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d "{
                \"text\": \"📱 APK Build Update\n\n$MESSAGE\n\nApp Version: $NEW_VERSION_NAME ($NEW_VERSION_CODE)\nEnvironment: $ENVIRONMENT\nBranch: $BRANCH_NAME\nCommit: $COMMIT_ID\nTriggered by: $ACTOR\nFirebase: uploaded successfully 🚀\"
              }"

      - name: Create Jira Ticket

        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}

        run: |

          echo "Using URL: $JIRA_BASE_URL"

          ISSUE_RESPONSE=$(curl -u $JIRA_EMAIL:$JIRA_API_TOKEN \
            -X POST \
            -H "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": {
                  \"key\": \"$JIRA_PROJECT_KEY\"
                },
                \"summary\": \"Regression Testing - Build $NEW_VERSION_NAME ($NEW_VERSION_CODE)\",
                \"description\": \"Build available on Firebase.\",
                \"issuetype\": {
                  \"name\": \"Story\"
                },
                \"labels\": [\"Regression\"]
              }
            }" \
            $JIRA_BASE_URL/rest/api/3/issue)

          echo "Response:"
          echo $ISSUE_RESPONSE
