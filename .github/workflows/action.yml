name: Build Signed APK & Upload to Firebase

on:
  workflow_dispatch:
    inputs:
      ENV:
        description: "Environment"
        required: false
        default: ""

      CORE_VERSION:
        description: "Core SDK version"
        required: false
        default: ""

      CAMERA_VERSION:
        description: "Camera SDK version"
        required: false
        default: ""

      MEDIA_VERSION:
        description: "Media SDK version"
        required: false
        default: ""

      IMAGE_VERSION:
        description: "Image SDK version"
        required: false
        default: ""

      VIDEO_VERSION:
        description: "Video SDK version"
        required: false
        default: ""
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install jq
        run: sudo apt-get install jq


      # create keystore file in runner
      - name: Decode keystore
        run: |

          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

          echo "KEYSTORE_PATH=$PWD/keystore.jks" >> $GITHUB_ENV


      # auto version increment from firebase latest release
      - name: Generate version
        run: |

          VERSION_CODE=${{ github.run_number }}

          VERSION_NAME="1.0.${{ github.run_number }}"

          echo "NEW_VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

          echo "NEW_VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

          echo "Version:"
          echo "$VERSION_NAME ($VERSION_CODE)"
        

      # update version.properties
      - name: Update SDK versions if provided
        run: |

          FILE=app/src/main/assets/version.properties

          echo "Before update:"
          cat $FILE

          update_value () {
            KEY=$1
            VALUE=$2

            if [ ! -z "$VALUE" ]; then
              sed -i "s/^$KEY=.*/$KEY=$VALUE/" $FILE
            fi
          }

          update_value "Env" "${{ github.event.inputs.ENV }}"
          update_value "core" "${{ github.event.inputs.CORE_VERSION }}"
          update_value "camera" "${{ github.event.inputs.CAMERA_VERSION }}"
          update_value "media" "${{ github.event.inputs.MEDIA_VERSION }}"
          update_value "image" "${{ github.event.inputs.IMAGE_VERSION }}"
          update_value "video" "${{ github.event.inputs.VIDEO_VERSION }}"

          echo "After update:"
          cat $FILE

